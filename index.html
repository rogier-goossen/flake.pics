<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
  <title></title>
  <link id="favicon" rel="icon" type="image/svg+xml">
  <style>
    * {
        margin: 0;
        padding: 0;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: black;
      touch-action: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>
<script>
// If you see this in the inspector, just read it here! >>>>> https://github.com/rogier-goossen/flake.pics/edit/main/index.html <<<<<

// seeds

function prng(seed) {
    let s = seed;

    return () => {
        s = (s + 0x6d2b79f5) | 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;

        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

let currentSeed;

function newSeed() {
    currentSeed = Math.floor(Math.random() * 2147483647);
    history.replaceState(null, '', '?' + currentSeed);

    return currentSeed;
}

function getSeed() {
    const raw = location.search.slice(1);
    currentSeed = raw ? parseInt(raw, 10) : newSeed();

    return currentSeed;
}

// generation

const SIZE = 160;
const HALF = SIZE / 2;
const ARM = 65;
const MIN_DIST_SQ = (ARM * 0.12) ** 2;

function buildArm(rand) {
    const n = 3 + (rand() * 4 | 0);
    const spine = [[0, 0]];

    for (let i = 1; i <= n; i++)
        spine.push([i / n * ARM, (rand() - 0.5) * ARM * 0.04]);

    const branches = [];
    const tips = [];

    function add(from, to) {
        for (const t of tips)

        if ((to[0] - t[0]) ** 2 + (to[1] - t[1]) ** 2 < MIN_DIST_SQ) return false;

        branches.push([from, to]);
        tips.push(to);

        return true;
    }

    for (let i = 1; i <= n; i++) {
        const [bx, by] = spine[i];
        const taper = 1 - (i / n) * 0.4;

        if (rand() > 0.2) {
            const len = (0.12 + rand() * 0.35) * ARM * taper;
            const ang = 0.25 + rand() * 1.2;
            const ex = bx + Math.cos(ang) * len;
            const ey = by + Math.sin(ang) * len;

            if (add([bx, by], [ex, ey])) {
                if (rand() > 0.4) {
                    const sl = len * (0.25 + rand() * 0.45);
                    const sa = ang + (rand() - 0.3) * 1.4;
                    add([ex, ey], [ex + Math.cos(sa) * sl, ey + Math.sin(sa) * sl]);
                }

                if (rand() > 0.65) {
                    const sl = len * (0.2 + rand() * 0.35);
                    const sa = ang - (0.3 + rand() * 0.8);
                    add([ex, ey], [ex + Math.cos(sa) * sl, ey + Math.sin(sa) * sl]);
                }
            }
        }

        if (rand() > 0.7) {
            const len = (0.08 + rand() * 0.2) * ARM * taper;
            const ang = 0.6 + rand();
            add([bx, by], [bx + Math.cos(ang) * len, by + Math.sin(ang) * len]);
        }
    }

    if (rand() > 0.3) {
        const tip = spine[n];
        const fl = ARM * (0.06 + rand() * 0.12);
        const a1 = 0.3 + rand() * 0.7;
        const a2 = -(0.3 + rand() * 0.7);
        add(tip, [tip[0] + Math.cos(a1) * fl, tip[1] + Math.sin(a1) * fl]);
        add(tip, [tip[0] + Math.cos(a2) * fl, tip[1] + Math.sin(a2) * fl]);
    }

    return { spine, branches };
}

function bezier(a, b) {
    const dx = b[0] - a[0], dy = b[1] - a[1];

    return `M${a[0].toFixed(1)},${a[1].toFixed(1)}` +
           `C${(a[0] + dx * .33).toFixed(1)},${(a[1] + dy * .12).toFixed(1)}` +
           ` ${(a[0] + dx * .66).toFixed(1)},${(b[1] - dy * .12).toFixed(1)}` +
           ` ${b[0].toFixed(1)},${b[1].toFixed(1)}`;
}

function rotate(x, y, cos, sin) {
    return [x * cos - y * sin, x * sin + y * cos];
}

// render

let pathData = '';
let strokeWidth = 5;

function buildPath(seed) {
    const rand = prng(seed);
    const { spine, branches } = buildArm(rand);

    const segments = [];

    for (let i = 0; i < spine.length - 1; i++)
        segments.push([spine[i], spine[i + 1]]);

    for (const [from, to] of branches) {
        segments.push([from, to]);
        segments.push([[from[0], -from[1]], [to[0], -to[1]]]);
    }

    pathData = '';

    for (let i = 0; i < 6; i++) {
        const cos = Math.cos(i * Math.PI / 3);
        const sin = Math.sin(i * Math.PI / 3);

        for (const [a, b] of segments)
            pathData += bezier(rotate(a[0], a[1], cos, sin), rotate(b[0], b[1], cos, sin));
    }
}

function toSVG() {
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${SIZE}" height="${SIZE}" viewBox="${-HALF} ${-HALF} ${SIZE} ${SIZE}">` +
        `<path d="${pathData}" fill="none" stroke="#fff" stroke-width="${strokeWidth.toFixed(1)}" stroke-linecap="round" stroke-linejoin="round"/>` +
        `</svg>`;
}

function paint() {
    let img = document.querySelector('img');

    if (!img) {
        img = document.createElement('img');
        img.alt = currentSeed;
        document.body.appendChild(img);
    }

    const svgDataUrl = 'data:image/svg+xml,' + encodeURIComponent(toSVG());
    img.src = svgDataUrl;
    img.alt = currentSeed;
    document.title = currentSeed;
    img.width = SIZE;
    img.height = SIZE;
    document.getElementById('favicon').href = svgDataUrl;
}

function generate(seed) {
    buildPath(seed);
    paint();
}

generate(getSeed());

// events

document.addEventListener('click', () => generate(newSeed()));

document.addEventListener('wheel', e => {
    e.preventDefault();
    strokeWidth = Math.min(8, Math.max(2, strokeWidth - e.deltaY * 0.01));
    paint();
}, { passive: false });

let lastTouchY = null;

document.addEventListener('touchstart', e => {
    if (e.touches.length === 1) lastTouchY = e.touches[0].clientY;
});

document.addEventListener('touchmove', e => {
    if (lastTouchY === null || e.touches.length !== 1) return;
    e.preventDefault();
    const y = e.touches[0].clientY;
    strokeWidth = Math.min(8, Math.max(2, strokeWidth + (lastTouchY - y) * 0.01));
    lastTouchY = y;
    paint();
}, { passive: false });

</script>
</body>
</html>
